<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Skitty's House</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#111;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    height:100dvh; overflow:hidden; user-select:none;
  }
  #game-wrap {
    position:relative;
    border:3px solid #e8c87a;
    box-shadow:0 0 20px #e8c87a40;
  }
  canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
  #joystick-zone {
    display:none; align-items:center; justify-content:center; margin-top:14px;
  }
  #joystick-outer {
    width:100px; height:100px; border-radius:50%;
    background:rgba(232,200,122,0.12);
    border:2px solid rgba(232,200,122,0.4);
    position:relative; touch-action:none;
  }
  #joystick-inner {
    width:40px; height:40px; border-radius:50%;
    background:rgba(232,200,122,0.75);
    box-shadow:0 0 10px #e8c87a60;
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
    transition:top 0.04s,left 0.04s;
  }
  #location-label {
    color:#e8c87a; font-family:'Courier New',monospace;
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    margin-bottom:6px; text-shadow:0 0 8px #e8c87a60;
  }
  @media (pointer:coarse) { #joystick-zone { display:flex; } }
</style>
</head>
<body>
<div id="location-label">Exterior</div>
<div id="game-wrap"><canvas id="c"></canvas></div>
<div id="joystick-zone">
  <div id="joystick-outer"><div id="joystick-inner"></div></div>
</div>
<script>
const EXT_SRC    = "assets/skittys-hut-exterior.png";
const INT_SRC    = "assets/skittys-hut-interior.png";
const SPRITE_SRC = "assets/meowth-test_sprite.png";

// ── Canvas ────────────────────────────────────────────────────────────────────
const SCALE  = 2;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ── Images ────────────────────────────────────────────────────────────────────
const extImg    = new Image(); extImg.src    = EXT_SRC;
const intImg    = new Image(); intImg.src    = INT_SRC;
const sprImg    = new Image(); sprImg.src    = SPRITE_SRC;

// ── Sprite ────────────────────────────────────────────────────────────────────
// Sheet 64x128, 2 cols x 4 rows, 32x32 frames
// Col0 row0: back walk1(UP)  row1: back walk2(UP)  row2: front walk1(DOWN)  row3: front walk2(DOWN)
// Col1 row0: left walk1      row1: left walk2       row2: right walk1        row3: right walk2
const FRAME_W = 32, FRAME_H = 32, ANIM_MS = 150;
const DIR_FRAMES = {
  up:    [[0,0],[1,0]],
  down:  [[2,0],[3,0]],
  left:  [[0,1],[1,1]],
  right: [[2,1],[3,1]],
};

// ── Scenes ────────────────────────────────────────────────────────────────────
const SCENES = {
  exterior: {
    img: extImg, w:392, h:312, label:'Exterior',
    colliders: [
      [0,   0,  392, 40],   // top forest
      [0,   0,   48, 312],  // left forest
      [340, 0,   52, 312],  // right forest
      [90,  40, 210,  90],  // skitty head top
      [156, 128,  50,  50],  // left cheek
      [185,128,  70,  50],  // right cheek
      [48, 200,  40,  20],  // log fence row1
      [48, 230,  40,  20],  // log fence row2
      [290, 48,  28,  26],  // stump top-right
      [320,170,  20,  18],  // stump mid-right
      [230,220,  50,  30],  // pond
      [48, 290, 296,  22],  // bottom fence
    ],
    door: { x:190, y:170, w:26, h:20 },
    spawnDefault:      { x:200, y:245, dir:'up'   },
    spawnFromInterior: { x:200, y:200, dir:'down' },
  },
  interior: {
    img: intImg, w:392, h:320, label:"Skitty's Hut",
    colliders: [
      [0,   0,  392, 58],   // top wall
      [0,   0,   48, 320],  // left wall
      [344, 0,   48, 320],  // right wall
      [0,  278,  148, 42],  // bottom-left wall
      [244,278,  148, 42],  // bottom-right wall
      [252,  58,  88,  60], // hay bed / chest
      [48,  68,  60,  50],  // left window decor
      [96, 165,  60,  45],  // wood table (center-left)
    ],
    door: { x:148, y:278, w:96, h:20 },
    spawnFromExterior: { x:194, y:258, dir:'up' },
    spawnFromInterior: null,
  },
};

// ── State ─────────────────────────────────────────────────────────────────────
const SPR_W = 10, SPR_H = 14;
let sceneName = 'exterior';
let player = { x:185, y:245, dir:'down', moving:false, animTimer:0, animFrame:0 };
let flashAlpha = 0, transitioning = false, pendingScene = null;

function applyScene(name, spawnKey) {
  sceneName = name;
  const s  = SCENES[name];
  const sp = s[spawnKey];
  player.x = sp.x; player.y = sp.y; player.dir = sp.dir;
  player.moving = false; player.animFrame = 0; player.animTimer = 0;
  canvas.width  = s.w * SCALE;
  canvas.height = s.h * SCALE;
  document.getElementById('location-label').textContent = s.label;
}
applyScene('exterior', 'spawnDefault');

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true;  });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// ── Joystick ──────────────────────────────────────────────────────────────────
const jOuter = document.getElementById('joystick-outer');
const jInner = document.getElementById('joystick-inner');
const JOY = { dx:0, dy:0, active:false, id:null, ox:0, oy:0 };
const MAX_D = 30;
jOuter.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0], r = jOuter.getBoundingClientRect();
  JOY.active=true; JOY.id=t.identifier;
  JOY.ox=r.left+r.width/2; JOY.oy=r.top+r.height/2;
}, {passive:false});
document.addEventListener('touchmove', e => {
  if (!JOY.active) return; e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== JOY.id) continue;
    let dx=t.clientX-JOY.ox, dy=t.clientY-JOY.oy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>MAX_D){dx*=MAX_D/d;dy*=MAX_D/d;}
    JOY.dx=dx; JOY.dy=dy;
    jInner.style.left=(50+dx/MAX_D*50)+'%';
    jInner.style.top =(50+dy/MAX_D*50)+'%';
  }
}, {passive:false});
document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier !== JOY.id) continue;
    JOY.active=false; JOY.dx=0; JOY.dy=0;
    jInner.style.left='50%'; jInner.style.top='50%';
  }
});

// ── Collision ─────────────────────────────────────────────────────────────────
function overlaps(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function canMove(nx, ny) {
  const s = SCENES[sceneName];
  if (nx<0||ny<0||nx+SPR_W>s.w||ny+SPR_H>s.h) return false;
  for (const [cx,cy,cw,ch] of s.colliders) {
    if (overlaps(nx,ny,SPR_W,SPR_H,cx,cy,cw,ch)) return false;
  }
  return true;
}
function checkDoor() {
  const d = SCENES[sceneName].door;
  return overlaps(player.x,player.y,SPR_W,SPR_H,d.x,d.y,d.w,d.h);
}

// ── Debug overlay (backtick key) ──────────────────────────────────────────────
let showDebug = false;
document.addEventListener('keydown', e => { if(e.key==='`') showDebug=!showDebug; });

function drawDebug() {
  if (!showDebug) return;
  ctx.globalAlpha=0.35;
  ctx.fillStyle='#ff0044';
  for (const [cx,cy,cw,ch] of SCENES[sceneName].colliders)
    ctx.fillRect(cx*SCALE,cy*SCALE,cw*SCALE,ch*SCALE);
  ctx.fillStyle='#00ffcc';
  const d=SCENES[sceneName].door;
  ctx.fillRect(d.x*SCALE,d.y*SCALE,d.w*SCALE,d.h*SCALE);
  ctx.globalAlpha=1;
}

// ── Sprite draw ───────────────────────────────────────────────────────────────
function drawSprite() {
  if (!sprImg.complete || sprImg.naturalWidth===0) return;
  const frames = DIR_FRAMES[player.dir];
  const fi = player.moving ? player.animFrame % frames.length : 0;
  const [row, col] = frames[fi];
  const sx=col*FRAME_W, sy=row*FRAME_H;
  const dw=FRAME_W*SCALE, dh=FRAME_H*SCALE;
  const dx=Math.round((player.x+SPR_W/2)*SCALE)-dw/2;
  const dy=Math.round((player.y+SPR_H)*SCALE)-dh;
  ctx.drawImage(sprImg, sx, sy, FRAME_W, FRAME_H, dx, dy, dw, dh);
}

// ── Game loop ─────────────────────────────────────────────────────────────────
const SPEED = 64;
let lastTime = 0;

function loop(ts) {
  const dt = Math.min((ts-lastTime)/1000, 0.05);
  lastTime = ts;

  if (!transitioning) {
    // Input
    let vx=0, vy=0;
    if(keys['w']||keys['W']||keys['ArrowUp'])    vy=-1;
    if(keys['s']||keys['S']||keys['ArrowDown'])  vy= 1;
    if(keys['a']||keys['A']||keys['ArrowLeft'])  vx=-1;
    if(keys['d']||keys['D']||keys['ArrowRight']) vx= 1;
    if(JOY.active) {
      const jx=JOY.dx/MAX_D, jy=JOY.dy/MAX_D;
      if(Math.abs(jx)>0.25) vx=jx>0?1:-1; else vx=0;
      if(Math.abs(jy)>0.25) vy=jy>0?1:-1; else vy=0;
    }
    if(vx&&vy){vx*=0.707;vy*=0.707;}

    player.moving = (vx!==0||vy!==0);
    if(player.moving) {
      if(Math.abs(vy)>=Math.abs(vx)) player.dir=vy<0?'up':'down';
      else player.dir=vx<0?'left':'right';
    }

    const nx=player.x+vx*SPEED*dt, ny=player.y+vy*SPEED*dt;
    if(canMove(nx,player.y)) player.x=nx;
    if(canMove(player.x,ny)) player.y=ny;

    if(player.moving) {
      player.animTimer+=dt*1000;
      if(player.animTimer>=ANIM_MS) {
        player.animTimer-=ANIM_MS;
        player.animFrame=(player.animFrame+1)%DIR_FRAMES[player.dir].length;
      }
    } else { player.animFrame=0; player.animTimer=0; }

    if(checkDoor()) {
      transitioning=true; flashAlpha=0;
      pendingScene = sceneName==='exterior' ? 'interior' : 'exterior';
    }
  } else {
    flashAlpha=Math.min(flashAlpha+dt*5,1);
    if(flashAlpha>=1) {
      if(pendingScene==='interior') applyScene('interior','spawnFromExterior');
      else                          applyScene('exterior','spawnFromInterior');
      transitioning=false; flashAlpha=0; pendingScene=null;
    }
  }

  // Render
  const s = SCENES[sceneName];
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(s.img && s.img.complete && s.img.naturalWidth>0)
    ctx.drawImage(s.img, 0, 0, canvas.width, canvas.height);
  drawDebug();
  drawSprite();

  if(flashAlpha>0) {
    ctx.globalAlpha=flashAlpha;
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.globalAlpha=1;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
